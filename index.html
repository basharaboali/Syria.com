<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوريا كوم | Syria Com</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-gold: #ffb700;
            --dark-bg: #050814;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--dark-bg);
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            /* صورة قلعة حلب مع فلتر معتم */
            background: linear-gradient(rgba(5, 8, 20, 0.85), rgba(5, 8, 20, 0.85)), 
                        url('https://upload.wikimedia.org/wikipedia/commons/e/e0/Aleppo_Citadel_at_night.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .main-container {
            width: 100%;
            max-width: 900px;
            background: rgba(10, 18, 42, 0.85);
            backdrop-filter: blur(10px);
            border: 2px solid var(--neon-blue);
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
        }

        h1 { font-family: 'Orbitron', sans-serif; color: var(--neon-blue); font-size: 3rem; }

        /* مؤشر سرعة الإنترنت */
        .speed-gauge {
            width: 150px; height: 75px;
            border: 5px solid var(--neon-gold);
            border-bottom: none;
            border-radius: 100px 100px 0 0;
            margin: 20px auto;
            position: relative;
            overflow: hidden;
        }
        .needle {
            width: 60%; height: 4px;
            background: #fff;
            position: absolute; bottom: 0; left: 0;
            transform-origin: right center;
            animation: move-needle 2s infinite alternate ease-in-out;
        }
        @keyframes move-needle {
            0% { transform: rotate(180deg); }
            100% { transform: rotate(0deg); }
        }

        .price-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            border-bottom: 3px solid var(--neon-blue);
        }

        .whatsapp-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 40px;
            background: linear-gradient(to right, #25d366, #128c7e);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            transition: 0.3s;
        }
        .whatsapp-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px #25d366; }
    </style>
</head>
<body>

<div class="main-container">
    <h1>SYRIA COM</h1>
    <p>سرعة لا تضاهى في مدينة حلب</p>

    <div class="speed-gauge">
        <div class="needle"></div>
    </div>
    <p>سرعة اتصال نشطة حالياً</p>

    <div class="price-grid">
        <div class="card">
            <h3>باقة المبتدئين</h3>
            <h2 style="color: var(--neon-blue);">2.5 ميغا</h2>
        </div>
        <div class="card">
            <h3>باقة العائلة</h3>
            <h2 style="color: var(--neon-blue);">5.5 ميغا</h2>
        </div>
        <div class="card" style="border-bottom-color: var(--neon-gold);">
            <h3>باقة الأساطير</h3>
            <h2 style="color: var(--neon-gold);">10 ميغا</h2>
        </div>
    </div>

    <a href="https://wa.me/905383422263" class="whatsapp-btn">
        <i class="fa-brands fa-whatsapp"></i> تواصل معنا عبر الواتساب
    </a>
</div>

</body>
</html>
