<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوريا كوم | Syria Com | إنترنت فائق السرعة</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-gold: #ffb700;
            --dark-bg: #050814;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--dark-bg);
            color: #fff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* إضافة قلعة حلب كخلفية مع دمج */
            background-image: linear-gradient(rgba(5, 8, 20, 0.9), rgba(5, 8, 20, 0.9)), 
                              url('https://upload.wikimedia.org/wikipedia/commons/e/e0/Aleppo_Citadel_at_night.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: rgba(10, 18, 42, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .logo-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px var(--neon-blue); }
            to { text-shadow: 0 0 20px var(--neon-gold); }
        }

        /* مؤشر السرعة المتحرك */
        .speedometer-wrapper {
            text-align: center;
            margin: 20px 0;
        }
        
        .needle {
            width: 100px; height: 100px;
            margin: 0 auto;
            border: 8px solid var(--neon-blue);
            border-bottom-color: transparent;
            border-radius: 50%;
            position: relative;
            animation: rotate 2s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .price-card {
            background: rgba(255,255,255,0.05);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        .price-card:hover { transform: translateY(-10px); border-color: var(--neon-blue); }

        .btn-whatsapp {
            display: block;
            background: #25d366;
            color: white;
            text-align: center;
            padding: 15px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="logo-title">Syria Com</h1>
        <p style="text-align: center; color: #aaa;">الإنترنت الذي تستحقه في قلب حلب 🚀</p>

        <!-- المؤشر المتحرك -->
        <div class="speedometer-wrapper">
            <div class="needle"></div>
            <p style="margin-top: 10px; font-weight: bold;">جاري التحقق من سرعة الشبكة...</p>
        </div>

        <div class="pricing-grid">
            <div class="price-card">
                <h3>الباقة الأساسية</h3>
                <h2 style="color: var(--neon-blue);">2.5 ميغا</h2>
                <p>مثالية للتصفح والواتساب</p>
            </div>
            <div class="price-card">
                <h3>باقة العائلة</h3>
                <h2 style="color: var(--neon-blue);">5.5 ميغا</h2>
                <p>مناسبة للمشاهدة العائلية</p>
            </div>
            <div class="price-card">
                <h3>باقة الأساطير</h3>
                <h2 style="color: var(--neon-gold);">10 ميغا</h2>
                <p>للألعاب والبث المباشر (4K)</p>
            </div>
        </div>

        <a href="https://wa.me/905383422263" class="btn-whatsapp">
            <i class="fa-brands fa-whatsapp"></i> اشترك الآن عبر الواتساب
        </a>
    </div>

</body>
</html>
